const priceSlider = document.getElementById("priceMax");
const bedSlider = document.getElementById("bedMin");
const bathSlider = document.getElementById("bathMin");
const checkInInput = document.getElementById("checkIn");
const priceVal = document.getElementById("priceVal");
const bedVal = document.getElementById("bedVal");
const bathVal = document.getElementById("bathVal");
const grid = document.getElementById("grid");
const stats = document.getElementById("stats");

// Set default date to Jun 20, 2026
checkInInput.value = "2026-06-20";

function fmt(n) { return "฿" + n.toLocaleString(); }

function render() {
  const maxPrice = parseInt(priceSlider.value);
  const minBed = parseInt(bedSlider.value);
  const minBath = parseInt(bathSlider.value);

  priceVal.textContent = "≤ " + fmt(maxPrice);
  bedVal.textContent = "≥ " + minBed + " ห้อง";
  bathVal.textContent = "≥ " + minBath + " ห้อง";

  const filtered = VILLAS.filter(v =>
    (!v.price || v.price <= maxPrice) &&
    v.bed >= minBed &&
    v.bath >= minBath
  );

  const withPrice = filtered.filter(v => v.price);
  const noPrice = filtered.filter(v => !v.price);

  stats.innerHTML = `
    <div class="stat"><strong>${filtered.length}</strong> ที่พัก</div>
    <div class="stat"><strong>${withPrice.length}</strong> มีราคา</div>
    <div class="stat ${noPrice.length ? 'none' : ''}"><strong>${noPrice.length}</strong> ไม่มีราคา (เลือกวันที่เพื่อดูราคา)</div>
  `;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results"><span>🏊</span>ไม่มีที่พักตรงเงื่อนไข<br><span style="font-size:14px;color:#555">ลองเพิ่มงบหรือลดจำนวนห้อง</span></div>`;
    return;
  }

  grid.innerHTML = filtered.map((v, i) => `
    <div class="card ${v.price ? '' : 'no-price'} pop" style="animation-delay:${i*20}ms">
      <div class="card-top">
        <div>
          <div class="id"><a href="https://www.pattayapartypoolvilla.com/v/${v.vid}" target="_blank">${v.id}</a></div>
          <div class="vid">v/${v.vid}</div>
        </div>
        <div style="text-align:right">
          ${v.price
            ? `<div class="price">฿${v.price.toLocaleString()}</div><div class="price-label">2 คืน · ${v.price_date}</div>`
            : `<div class="no-price-tag">ไม่มีราคา</div>`}
        </div>
      </div>
      <div class="loc">📍 ${v.location}</div>
      <div class="badges">
        <div class="badge">🛏️ <strong>${v.bed}</strong><span class="u"> ห้องนอน</span></div>
        <div class="badge">🚿 <strong>${v.bath}</strong><span class="u"> ห้องน้ำ</span></div>
        <div class="badge">👥 <strong>${v.guests}</strong><span class="u"> คน</span></div>
      </div>
      ${v.bed_detail && v.bed_detail.length ? `
      <hr class="divider">
      <div class="beds">
        <div class="beds-title">📋 ที่นอน</div>
        ${v.bed_detail.slice(0,6).map(line => `<span class="bed-line">• ${line.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</span>`).join('')}
      </div>` : ''}
      <div class="footer">
        <a href="https://www.pattayapartypoolvilla.com/v/${v.vid}" target="_blank">🔗 ดูรายละเอียด & จอง</a>
        <br><a class="book-btn" href="https://www.pattayapartypoolvilla.com/v/${v.vid}" target="_blank">📅 ดูราคาตามวันที่</a>
      </div>
    </div>
  `).join('');
}
